      label: APP
      width: 15
    - key: owner
      label: OWNER
      width: 12
      fallback: ownername
    - key: host
      label: HOST
      width: 20
    - key: protocol
      label: PROTOCOL
      width: 10
    - key: status
      label: STATUS
      width: 10
    - key: desktop_type
      label: TYPE
      width: 12
    - key: createDate
      label: CREATE_TIME
      width: 20
    - key: lastUseTime
      label: LAST_USE
      width: 20
    - key: isDocker
      label: DOCKER
      width: 6
    - key: isShare
      label: SHARE
      width: 6
    - key: os
      label: OS
      width: 8
    - key: startmode
      label: MODE
      width: 8

sessions.list-all:
  type: table
  title: All Sessions
  items_path: data
  fields:
    - key: session_id
      label: SESSION_ID
      width: 12
      fallback: id
    - key: name
      label: NAME
      width: 20
    - key: app_id
      label: APP
      width: 15
    - key: owner
      label: OWNER
      width: 12
      fallback: ownername
    - key: host
      label: HOST
      width: 20
    - key: protocol
      label: PROTOCOL
      width: 10
    - key: status
      label: STATUS
      width: 10
    - key: desktop_type
      label: TYPE
      width: 12
    - key: createDate
      label: CREATE_TIME
      width: 20
    - key: lastUseTime
      label: LAST_USE
      width: 20
    - key: isDocker
      label: DOCKER
      width: 6
    - key: isShare
      label: SHARE
      width: 6
    - key: os
      label: OS
      width: 8
    - key: startmode
      label: MODE
      width: 8

# ===========================================================================
# Files
# ===========================================================================

files.list:
  type: table
  title: Files
  items_path: data
  fields:
    - key: fileName
      label: NAME
      width: 30
      prefix_key: fileType
      prefix_map:
        directory: "[D]"
        file: "[F]"
    - key: owner
      label: OWNER
      width: 12
    - key: size
      label: SIZE
      width: 10
      format: size
    - key: ts
      label: MODIFIED
      width: 20
      fallback: modifiedDate

# SFTP file listing — shows uid/gid and permissions
files.list.sftp:
  type: table
  title: Files (SFTP)
  items_path: data
  fields:
    - key: mode
      label: MODE
      width: 11
    - key: fileName
      label: NAME
      width: 30
      prefix_key: fileType
      prefix_map:
        directory: "[D]"
        file: "[F]"
        symlink: "[L]"
    - key: uid
      label: UID
      width: 6
    - key: gid
      label: GID
      width: 6
    - key: size
      label: SIZE
      width: 10
      format: size
    - key: modifiedDate
      label: MODIFIED
      width: 20

# ===========================================================================
# Applications
# ===========================================================================

apps.list:
  type: table
  title: Applications
  items_path: data
  fields:
    - key: id
      label: APP_ID
      width: 25
    - key: name
      label: NAME
      width: 25
    - key: type
      label: TYPE
      width: 8
      fallback: mode
    - key: protocol
      label: PROTOCOL
      width: 10
    - key: os
      label: OS
      width: 8

# ===========================================================================
# Organization
# ===========================================================================

departments.list:
  type: tree
  title: Departments
  items_path: data
  name_key: displayName
  fallback_name_key: name
  children_key: items

users.list:
  type: table
  title: Users
  items_path: data.list
  total_key: data.totalCount
  fields:
    - key: userName
      label: USERNAME
      width: 15
    - key: userNameCn
      label: DISPLAY_NAME
      width: 15
    - key: userDepNameCn
      label: DEPARTMENT
      width: 12
      fallback: userDepName
    - key: userStat
      label: STATUS
      width: 8
    - key: userMail
      label: EMAIL
      width: 25

