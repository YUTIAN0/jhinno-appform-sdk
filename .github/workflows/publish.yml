name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches version
        if: env.IS_TAG == 'true'
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match pyproject.toml version ${PKG_VERSION}"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          APPFORM_AES_KEY: "0123456789abcdef"
        run: pytest tests/ -v

  build_linux:
    if: env.IS_TAG == 'true'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and bundle for Linux py${{ matrix.python-version }}
        run: |
          PYVER=$(echo ${{ matrix.python-version }} | tr -d '.')

          # Build SDK wheel
          python -m pip install --upgrade pip build
          python -m build

          # Create venv and install SDK to resolve all deps
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install dist/jhinno_appform_sdk-*-py3-none-any.whl

          # Download all resolved dependencies (transitive) for this Python on Linux
          mkdir -p bundle
          pip download \
            --dest bundle/ \
            --no-deps \
            --only-binary=:all: \
            $(pip freeze | grep -v jhinno)

          # Also download source-only deps (pure Python like urllib3, certifi, idna)
          pip download \
            --dest bundle/ \
            --no-deps \
            --no-binary :all: \
            $(pip freeze | grep -v jhinno) 2>/dev/null || true

          # Copy SDK wheel into bundle
          cp dist/jhinno_appform_sdk-*-py3-none-any.whl bundle/

      - name: Create tarball
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          PYVER=$(echo ${{ matrix.python-version }} | tr -d '.')
          echo "Bundle contents:"
          ls -la bundle/
          tar czf "jhinno-appform-sdk-${VERSION}-linux-x86_64-cp${PYVER}.tar.gz" bundle/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-cp${{ matrix.python-version }}
          path: jhinno-appform-sdk-*-linux-x86_64-cp*.tar.gz

  build_windows:
    if: env.IS_TAG == 'true'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and bundle for Windows py${{ matrix.python-version }}
        run: |
          $PYVER = "${{ matrix.python-version }}".Replace('.','')

          # Build SDK wheel
          python -m pip install --upgrade pip build
          python -m build

          # Create venv and install SDK to resolve all deps
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          pip install --upgrade pip
          pip install dist\jhinno_appform_sdk-*-py3-none-any.whl

          # Download all resolved dependencies (transitive) for this Python on Windows
          New-Item -ItemType Directory -Force -Path bundle | Out-Null
          $DEPS = pip freeze | Select-String -Pattern '^jhinno' -NotMatch
          pip download --dest bundle/ --no-deps --only-binary=:all: $DEPS
          pip download --dest bundle/ --no-deps --no-binary :all: $DEPS 2>$null || true

          # Copy SDK wheel into bundle
          Copy-Item (Get-ChildItem dist\jhinno_appform_sdk-*-py3-none-any.whl).FullName bundle\

          echo "Bundle contents:"
          Get-ChildItem bundle\

      - name: Create zip
        run: |
          $VERSION = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches.Groups[1].Value
          $PYVER = "${{ matrix.python-version }}".Replace('.','')
          $NAME = "jhinno-appform-sdk-$VERSION-windows-x86_64-cp$PYVER.zip"
          Compress-Archive -Path "bundle\*" -DestinationPath $NAME -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-cp${{ matrix.python-version }}
          path: jhinno-appform-sdk-*-windows-x86_64-cp*.zip

  release:
    if: env.IS_TAG == 'true'
    needs: [build_linux, build_windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist/
          merge-multiple: true

      - name: List release files
        run: ls -lh dist/

      - name: Create release body
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cat > release_body.md << BODY
          ## Installation

          ### Standard installation (recommended)

          ```bash
          pip install jhinno-appform-sdk
          ```

          ### Offline installation

          Download the appropriate release package below, then install without network access.

          **Linux:**

          ```bash
          tar xzf jhinno-appform-sdk-${VERSION}-linux-x86_64-cp<pyver>.tar.gz
          pip install --no-index --find-links=./bundle/ jhinno-appform-sdk
          ```

          **Windows:**

          ```powershell
          Expand-Archive jhinno-appform-sdk-${VERSION}-windows-x86_64-cp<pyver>.zip
          pip install --no-index --find-links=./bundle/ jhinno-appform-sdk
          ```

          > Replace `<pyver>` with your Python version (e.g., `cp312` for Python 3.12).

          ## Package contents

          Each bundle includes the SDK wheel and all resolved transitive dependencies for the specified Python version and platform.

          ## Supported platforms

          | Platform | Python versions |
          |----------|----------------|
          | Linux x86_64 (manylinux2014) | 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14 |
          | Windows x86_64 | 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14 |
          BODY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release_body.md
          generate_release_notes: true
