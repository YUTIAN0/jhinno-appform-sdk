name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match pyproject.toml version ${PKG_VERSION}"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          APPFORM_AES_KEY: "0123456789abcdef"
        run: pytest tests/ -v

  publish_testpypi:
    needs: [test]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/jhinno-appform-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          password: ${{ secrets.TESTPYPI_TOKEN }}

  build_pkg:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build_linux:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and bundle for Linux py${{ matrix.python-version }}
        run: |
          PYVER=$(echo ${{ matrix.python-version }} | tr -d '.')

          # Build SDK wheel
          python -m pip install --upgrade pip build
          python -m build

          # Create venv and install SDK to resolve all deps
          python -m venv venv
          source venv/bin/activate
          WHEEL=$(ls dist/jhinno_appform_sdk-*-py3-none-any.whl)
          python -m pip install "$WHEEL"
          python -m pip install "$WHEEL[sftp]"

          # List resolved dependencies
          echo "=== Resolved dependencies ==="
          pip freeze | grep -v jhinno

          # Download all resolved dependencies for this Python on Linux
          mkdir -p bundle
          pip download \
            --dest bundle/ \
            --no-deps \
            --only-binary=:all: \
            $(pip freeze | grep -v jhinno)

          # Also download source-only deps (pure Python like urllib3, certifi, idna)
          pip download \
            --dest bundle/ \
            --no-deps \
            --no-binary :all: \
            $(pip freeze | grep -v jhinno) 2>/dev/null || true

          # Copy SDK wheel into bundle
          cp "$WHEEL" bundle/

          echo "=== Bundle contents ==="
          ls -la bundle/

      - name: Create tarball
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          PYVER=$(echo ${{ matrix.python-version }} | tr -d '.')
          tar czf "jhinno-appform-sdk-${VERSION}-linux-x86_64-cp${PYVER}.tar.gz" bundle/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-cp${{ matrix.python-version }}
          path: jhinno-appform-sdk-*-linux-x86_64-cp*.tar.gz

  build_windows:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and bundle for Windows py${{ matrix.python-version }}
        run: |
          $ErrorActionPreference = "Stop"
          $PYVER = "${{ matrix.python-version }}".Replace('.','')

          # Build SDK wheel
          python -m pip install --upgrade pip build
          python -m build

          # Create venv and install SDK to resolve all deps
          python -m venv venv
          & .\venv\Scripts\Activate.ps1
          $WHEEL = (Get-ChildItem dist\jhinno_appform_sdk-*-py3-none-any.whl).FullName
          python -m pip install $WHEEL
          python -m pip install "$WHEEL[sftp]"

          # List resolved dependencies
          Write-Host "=== Resolved dependencies ==="
          $FREEZE = pip freeze
          foreach ($line in $FREEZE) { Write-Host $line }

          # Get deps excluding jhinno-appform-sdk
          $DEPS = @()
          foreach ($line in $FREEZE) {
            if ($line -notmatch '^jhinno') {
              $DEPS += $line
            }
          }
          Write-Host "=== Downloading $($DEPS.Count) dependencies ==="
          foreach ($d in $DEPS) { Write-Host $d }

          # Create bundle directory
          Remove-Item -Recurse -Force bundle -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path bundle | Out-Null

          # Download binary wheels
          Write-Host "--- Downloading binary wheels ---"
          if ($DEPS.Count -gt 0) {
            pip download --dest bundle/ --no-deps --only-binary=:all: $DEPS 2>&1
          }

          # Download source-only deps (pure Python packages)
          Write-Host "--- Downloading source packages ---"
          if ($DEPS.Count -gt 0) {
            pip download --dest bundle/ --no-deps --no-binary :all: $DEPS 2>&1
          }

          # Copy SDK wheel into bundle
          Copy-Item (Get-ChildItem dist\jhinno_appform_sdk-*-py3-none-any.whl).FullName bundle\

          Write-Host "=== Bundle contents ==="
          Get-ChildItem bundle\
          Write-Host "Total files: $((Get-ChildItem bundle\).Count)"

      - name: Create zip
        run: |
          $VERSION = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches.Groups[1].Value
          $PYVER = "${{ matrix.python-version }}".Replace('.','')
          $NAME = "jhinno-appform-sdk-$VERSION-windows-x86_64-cp$PYVER.zip"
          Compress-Archive -Path "bundle\*" -DestinationPath $NAME -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-cp${{ matrix.python-version }}
          path: jhinno-appform-sdk-*-windows-x86_64-cp*.zip

  release:
    needs: [build_pkg, build_linux, build_windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: dist/
          merge-multiple: true

      - name: List release files
        run: ls -lh dist/

      - name: Create release body
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cat > release_body.md << 'ENDBODY'
          ## Installation

          ### Standard installation (recommended)

          ```bash
          pip install jhinno-appform-sdk
          ```

          ### Offline installation

          Download the appropriate release package below, then install without network access.

          **Linux:**

          ```bash
          tar xzf jhinno-appform-sdk-VERSION-linux-x86_64-cp<pyver>.tar.gz
          pip install --no-index --find-links=./bundle/ jhinno-appform-sdk
          ```

          **Windows:**

          ```powershell
          Expand-Archive jhinno-appform-sdk-VERSION-windows-x86_64-cp<pyver>.zip
          pip install --no-index --find-links=./bundle/ jhinno-appform-sdk
          ```

          > Replace `VERSION` with the release version (e.g., `0.0.1`) and `<pyver>` with your Python version (e.g., `cp312` for Python 3.12).

          ## Package contents

          Each bundle includes the SDK wheel and all resolved transitive dependencies for the specified Python version and platform.

          ## Supported platforms

          | Platform | Python versions |
          |----------|----------------|
          | Linux x86_64 (manylinux2014) | 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14 |
          | Windows x86_64 | 3.8, 3.9, 3.10, 3.11, 3.12, 3.13, 3.14 |
          ENDBODY
          sed -i "s/VERSION/${VERSION}/g" release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release_body.md
